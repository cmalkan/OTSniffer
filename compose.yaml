services:
  otsniffer:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FLASK_DEBUG=0
    healthcheck:
      test: ["CMD-SHELL", "python - <<PY\nimport urllib.request, sys\n\ntry:\n    with urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2) as r:\n        sys.exit(0 if r.status == 200 else 1)\nexcept Exception:\n    sys.exit(1)\nPY"]
